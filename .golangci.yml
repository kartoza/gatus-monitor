version: "2"

run:
  timeout: 5m
  tests: false
  modules-download-mode: readonly

linters:
  enable:
    - errcheck      # Check for unchecked errors (default)
    - govet         # Go vet (default)
    - ineffassign   # Detect ineffectual assignments (default)
    - staticcheck   # Static analysis (default)
    - unused        # Check for unused constants, variables, functions and types (default)
    - misspell      # Check for misspelled English words
    - revive        # Fast, configurable, extensible, flexible linter
    - gocyclo       # Cyclomatic complexity
    - prealloc      # Find slice declarations that could potentially be preallocated
    - unconvert     # Remove unnecessary type conversions
    - nakedret      # Check naked returns in functions
    # Disabled due to false positives in this codebase:
    # - gosec       # Security checker - false positives for intentional HTTP/exec
    # - gocritic    # Opinionated style - ifElseChain false positive
    # - dupl        # Code clone - test code has similar patterns
    # - unparam     # Unused params - callback params in tests

formatters:
  enable:
    - gofmt         # Check whether code was gofmt-ed
    - goimports     # Check import statements are formatted

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    shadow:
      strict: true

  gocyclo:
    min-complexity: 15

  dupl:
    threshold: 100

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental
      - opinionated

  revive:
    confidence: 0.8
    rules:
      - name: var-naming
        disabled: false
      - name: package-comments
        disabled: false
      - name: exported
        disabled: false

  nakedret:
    max-func-lines: 30

  misspell:
    locale: US

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - revive
        - unparam
        - gocritic

    # Exclude known linters from partially hard-vendored code
    - path: internal/icons/
      linters:
        - errcheck
        - gosec

    # Exclude SSRF warnings for HTTP clients that intentionally fetch URLs
    - linters:
        - gosec
      text: "G704"

    # Exclude subprocess warnings for intentional URL opening
    - linters:
        - gosec
      text: "G204"

    # Exclude gocritic suggestions for if-else chains (stylistic preference)
    - linters:
        - gocritic
      text: "ifElseChain"

  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    colored-line-number: {}
  print-issued-lines: true
  print-linter-name: true
