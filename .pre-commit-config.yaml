repos:
  # Go formatting
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
        name: Format Go code
        description: Run go fmt on all Go files
      - id: go-vet
        name: Run go vet
        description: Run go vet on all Go files
      - id: go-mod-tidy
        name: Tidy Go modules
        description: Run go mod tidy

  # Golangci-lint
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.55.2
    hooks:
      - id: golangci-lint
        name: Run golangci-lint
        description: Run golangci-lint on all Go files

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=500']
      - id: check-case-conflict
        name: Check for case conflicts
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-yaml
        name: Check YAML syntax
      - id: check-json
        name: Check JSON syntax
      - id: check-toml
        name: Check TOML syntax
      - id: end-of-file-fixer
        name: Fix end of files
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: ['--fix=lf']
      - id: detect-private-key
        name: Detect private keys

  # Spell checking
  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.6
    hooks:
      - id: codespell
        name: Check spelling
        args: [
          '--ignore-words-list=crate,Erro',
          '--skip=*.svg,*.png,*.jpg,*.ico,go.sum,*.log'
        ]

  # Markdown lint
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        name: Lint Markdown files
        args: ['--fix']

  # License headers (custom hook)
  - repo: local
    hooks:
      - id: go-license-header
        name: Check license headers
        entry: bash -c 'for file in $(git diff --cached --name-only --diff-filter=ACM | grep "\.go$"); do if ! grep -q "Copyright (c)" "$file"; then echo "Missing license header in $file"; exit 1; fi; done || true'
        language: system
        types: [go]
        pass_filenames: false

  # Go tests
  - repo: local
    hooks:
      - id: go-test
        name: Run Go tests
        entry: go test -v -race ./...
        language: system
        pass_filenames: false
        types: [go]

  # Go build check
  - repo: local
    hooks:
      - id: go-build
        name: Build Go application
        entry: go build -o /dev/null ./cmd/gatus-monitor
        language: system
        pass_filenames: false
        types: [go]
