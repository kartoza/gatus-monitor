name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            output: gatus-monitor_linux_amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            output: gatus-monitor_linux_arm64

          # macOS
          - os: macos-latest
            goos: darwin
            goarch: amd64
            output: gatus-monitor_darwin_amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            output: gatus-monitor_darwin_arm64

          # Windows
          - os: windows-latest
            goos: windows
            goarch: amd64
            output: gatus-monitor_windows_amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: go build -v -ldflags="-s -w" -o ${{ matrix.output }} ./cmd/gatus-monitor

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Display structure
        run: ls -R dist/

      - name: Create checksums
        run: |
          cd dist
          find . -type f -exec sha256sum {} \; > checksums.txt

      - name: Generate release notes
        id: release_notes
        run: |
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
          body: |
            ## What's Changed

            ${{ steps.release_notes.outputs.RELEASE_NOTES }}

            ## Installation

            Download the appropriate binary for your platform and extract it.

            ### Linux
            ```bash
            wget https://github.com/kartoza/gatus-monitor/releases/download/${{ github.ref_name }}/gatus-monitor_linux_amd64
            chmod +x gatus-monitor_linux_amd64
            ./gatus-monitor_linux_amd64
            ```

            ### macOS
            ```bash
            wget https://github.com/kartoza/gatus-monitor/releases/download/${{ github.ref_name }}/gatus-monitor_darwin_arm64
            chmod +x gatus-monitor_darwin_arm64
            ./gatus-monitor_darwin_arm64
            ```

            ### Windows
            Download `gatus-monitor_windows_amd64.exe` and run it.

            ## Checksums

            SHA256 checksums are available in `checksums.txt`.

            ---

            Made with 💗 by [Kartoza](https://kartoza.com)

          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
