name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            output: gatus-monitor_linux_amd64
          - goarch: arm64
            output: gatus-monitor_linux_arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev

      - name: Install cross-compiler for ARM64
        if: matrix.goarch == 'arm64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (amd64)
        if: matrix.goarch == 'amd64'
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
        run: go build -v -ldflags="-s -w" -o ${{ matrix.output }} ./cmd/gatus-monitor

      - name: Build (arm64)
        if: matrix.goarch == 'arm64'
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 1
          CC: aarch64-linux-gnu-gcc
        run: go build -v -ldflags="-s -w" -o ${{ matrix.output }} ./cmd/gatus-monitor

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            output: gatus-monitor_darwin_amd64
          - goarch: arm64
            output: gatus-monitor_darwin_arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: go build -v -ldflags="-s -w" -o ${{ matrix.output }} ./cmd/gatus-monitor

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 1
        run: go build -v -ldflags="-s -w -H windowsgui" -o gatus-monitor_windows_amd64.exe ./cmd/gatus-monitor

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gatus-monitor_windows_amd64.exe
          path: gatus-monitor_windows_amd64.exe

  build-macos-app:
    name: Build macOS App Bundle
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Fyne tool
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Build macOS App Bundle (Universal)
        run: |
          # Build for arm64
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 go build -v -ldflags="-s -w" -o gatus-monitor-arm64 ./cmd/gatus-monitor
          # Build for amd64
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 go build -v -ldflags="-s -w" -o gatus-monitor-amd64 ./cmd/gatus-monitor
          # Create universal binary
          lipo -create -output gatus-monitor gatus-monitor-arm64 gatus-monitor-amd64
          # Package as app bundle
          fyne package -os darwin -name "Gatus Monitor" -appID com.kartoza.gatus-monitor -icon Icon.png || true
          # Create DMG if app bundle was created
          if [ -d "Gatus Monitor.app" ]; then
            hdiutil create -volname "Gatus Monitor" -srcfolder "Gatus Monitor.app" -ov -format UDZO gatus-monitor_macos.dmg
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: gatus-monitor_macos.dmg
          path: gatus-monitor_macos.dmg
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows, build-macos-app]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f -exec mv {} release/ \;
          ls -la release/

      - name: Create checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate release notes
        id: release_notes
        run: |
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          if git describe --tags --abbrev=0 HEAD^ 2>/dev/null; then
            git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> $GITHUB_OUTPUT
          else
            git log --pretty=format:"- %s" --max-count=20 >> $GITHUB_OUTPUT
          fi
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          body: |
            ## What's Changed

            ${{ steps.release_notes.outputs.RELEASE_NOTES }}

            ## Installation

            Download the appropriate binary for your platform.

            ### Linux (amd64)
            ```bash
            wget https://github.com/kartoza/gatus-monitor/releases/download/${{ github.ref_name }}/gatus-monitor_linux_amd64
            chmod +x gatus-monitor_linux_amd64
            ./gatus-monitor_linux_amd64
            ```

            ### Linux (arm64)
            ```bash
            wget https://github.com/kartoza/gatus-monitor/releases/download/${{ github.ref_name }}/gatus-monitor_linux_arm64
            chmod +x gatus-monitor_linux_arm64
            ./gatus-monitor_linux_arm64
            ```

            ### macOS
            **Option 1: DMG (recommended)**
            Download `gatus-monitor_macos.dmg`, open it, and drag "Gatus Monitor" to Applications.

            **Option 2: Command line**
            ```bash
            # Apple Silicon (M1/M2/M3)
            wget https://github.com/kartoza/gatus-monitor/releases/download/${{ github.ref_name }}/gatus-monitor_darwin_arm64
            chmod +x gatus-monitor_darwin_arm64
            ./gatus-monitor_darwin_arm64

            # Intel Mac
            wget https://github.com/kartoza/gatus-monitor/releases/download/${{ github.ref_name }}/gatus-monitor_darwin_amd64
            chmod +x gatus-monitor_darwin_amd64
            ./gatus-monitor_darwin_amd64
            ```

            ### Windows
            Download `gatus-monitor_windows_amd64.exe` and run it.

            ## Checksums

            SHA256 checksums are available in `checksums.txt`.

            ---

            Made with 💗 by [Kartoza](https://kartoza.com) | [Donate!](https://github.com/sponsors/kartoza) | [GitHub](https://github.com/kartoza/gatus-monitor)

          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
